name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Type check + frontend build
        run: npm run build:frontend

      - name: Frontend unit tests
        run: npm test

      - name: Frontend browser tests
        run: npm run test:browser

      - name: Rust tests (workspace crates)
        run: npm run test:rust

  app-check:
    name: app-check (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # tauri-build verifies every `bundle.externalBin` exists at the
      # `<name>-<target-triple>` path before kimbo-app's build script returns.
      # Build the sidecar first so src-tauri/build.rs can stage it.
      - name: Build claude-statusline sidecar
        run: cargo build -p kimbo-claude-statusline

      - name: cargo check src-tauri
        run: cargo check -p kimbo-app
